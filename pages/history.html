<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Credible geçmiş gün beslenme kayıtlarını ve günlük kalori toplamlarını görüntüle.">
    <title>Geçmiş Kayıtlar | Credible</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/history.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <a class="brand" href="../index.html" aria-label="Credible ana sayfa">
                <span class="brand-mark">C</span>
                <span>Credible</span>
            </a>
            <nav class="main-nav" aria-label="Ana menü">
                <a href="features.html">Özellikler</a>
                <a href="calorie-calculator.html">Kalori İhtiyacını Hesapla</a>
                <a href="daily-calorie-tracker.html">Günlük Kalori Takibi</a>
                <a href="history.html" aria-current="page">Geçmiş Kayıtlar</a>
            </nav>
            <button id="logout-button" class="header-button" type="button">Çıkış Yap</button>
        </div>
    </header>

    <main class="history-page">
        <section class="history-section">
            <div class="container">
                <div class="history-heading">
                    <div>
                        <span class="eyebrow">Beslenme geçmişi</span>
                        <h1>Geçmiş günlerini tek ekranda incele.</h1>
                        <p>Bugün dışındaki kayıtların günlere ayrılarak burada gösterilir.</p>
                    </div>
                    <a class="history-back-link" href="daily-calorie-tracker.html">Bugünün günlüğüne dön</a>
                </div>

                <p id="history-status" class="history-status" aria-live="polite">Geçmiş kayıtlar yükleniyor...</p>
                <div id="history-list" class="history-list"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
