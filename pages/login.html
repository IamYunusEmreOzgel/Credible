<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Credible hesabına giriş yap.">
    <title>Giriş Yap | Credible</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <a class="brand" href="../index.html" aria-label="Credible ana sayfa">
                <span class="brand-mark">C</span>
                <span>Credible</span>
            </a>
        </div>
    </header>

    <main class="login-page">
        <section class="login-card">
            <span class="eyebrow">Yalnızca davetli kullanıcılar</span>
            <h1>Hesabına giriş yap.</h1>
            <p>Yemek kayıtlarına erişmek için sana oluşturulan e-posta ve şifreyi kullan.</p>

            <form id="login-form" class="login-form" novalidate>
                <label>
                    <span>E-posta</span>
                    <input id="email" name="email" type="email" autocomplete="email" required>
                </label>

                <label>
                    <span>Şifre</span>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </label>

                <p id="login-error" class="form-error" role="alert"></p>
                <button id="login-button" class="primary-button" type="submit">Giriş Yap</button>
            </form>

            <p class="login-note">Bu uygulamada herkese açık kayıt olma özelliği bulunmaz.</p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
